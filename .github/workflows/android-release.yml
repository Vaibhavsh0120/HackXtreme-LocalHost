name: Build and Release Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "17"
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  ANDROID_NDK_VERSION: "28.0.13004108"

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}"

      - name: Install dependencies
        run: npm ci

      - name: Compute release version
        id: version
        shell: bash
        run: |
          APP_VERSION=$(node -p "require('./package.json').version")
          RELEASE_VERSION="${APP_VERSION}.${GITHUB_RUN_NUMBER}"
          APK_NAME="runanywhere-starter-${RELEASE_VERSION}.apk"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_code=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "version_name=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=android-v${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_name=Android Release v${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "apk_name=${APK_NAME}" >> "$GITHUB_OUTPUT"

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Android release APK
        working-directory: android
        env:
          ANDROID_VERSION_CODE: ${{ steps.version.outputs.version_code }}
          ANDROID_VERSION_NAME: ${{ steps.version.outputs.version_name }}
        run: ./gradlew --no-daemon -Pandroid.cxx.buildDir="${RUNNER_TEMP}/rn-cxx" assembleRelease

      - name: Prepare release asset
        shell: bash
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk \
            "android/app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ steps.version.outputs.release_version }}
          path: android/app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: ${{ steps.version.outputs.release_name }}
          files: android/app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}
          generate_release_notes: true
          overwrite_files: true
